<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#16a34a">
  <title>Login – Spielzeitmanager</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-700 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm mx-4">
    <div class="text-center mb-6">
      <div class="text-5xl mb-2">⚽</div>
      <h1 class="text-2xl font-bold text-gray-800">Spielzeitmanager</h1>
    </div>
    <form method="POST" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Passwort</label>
        <input type="password" name="password" autofocus
               class="w-full border border-gray-300 rounded-lg px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-green-500"
               placeholder="••••••••">
      </div>
      {% if error %}
      <p class="text-red-600 text-sm">{{ error }}</p>
      {% endif %}
      <button type="submit"
              class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg text-lg transition-colors">
        Anmelden
      </button>
    </form>
  </div>
</body>
</html>
