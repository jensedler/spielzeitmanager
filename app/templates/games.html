{% extends "base.html" %}
{% block title %}Spiele – Spielzeitmanager{% endblock %}
{% block content %}
<div x-data="gamesApp()" x-init="load()" x-cloak>

  <div class="flex items-center justify-between mb-4">
    <h2 class="text-xl font-bold">Spiele</h2>
    <button @click="showForm = !showForm"
            class="btn-tap bg-green-600 hover:bg-green-700 text-white font-semibold px-4 py-2 rounded-lg text-sm transition-colors">
      + Neues Spiel
    </button>
  </div>

  <!-- New game form -->
  <div x-show="showForm" x-transition class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">
    <h3 class="font-semibold mb-3">Neues Spiel anlegen</h3>
    <div class="space-y-3">
      <div>
        <label class="block text-sm text-gray-600 mb-1">Datum</label>
        <input type="date" x-model="form.date"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
      </div>
      <div>
        <label class="block text-sm text-gray-600 mb-1">Gegner</label>
        <input type="text" x-model="form.opponent" placeholder="Gegner eingeben…" maxlength="80"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
      </div>
      <div>
        <label class="block text-sm text-gray-600 mb-2">Spieler auswählen</label>
        <div class="grid grid-cols-2 gap-2">
          <template x-for="p in allPlayers" :key="p.id">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" :value="p.id" x-model="form.player_ids"
                     class="rounded text-green-600 focus:ring-green-500">
              <span class="text-sm" x-text="p.name"></span>
            </label>
          </template>
        </div>
      </div>
      <div class="flex gap-2 pt-1">
        <button @click="createGame()"
                class="btn-tap flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg transition-colors">
          Erstellen
        </button>
        <button @click="showForm = false"
                class="btn-tap flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 rounded-lg transition-colors">
          Abbrechen
        </button>
      </div>
    </div>
  </div>

  <!-- Game list -->
  <ul class="space-y-3">
    <template x-for="g in games" :key="g.id">
      <li class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <a :href="`/games/${g.id}`" class="block px-4 py-3 hover:bg-gray-50 transition-colors">
          <div class="flex items-center justify-between">
            <div>
              <div class="font-semibold" x-text="g.opponent"></div>
              <div class="text-sm text-gray-500" x-text="formatDate(g.date)"></div>
            </div>
            <div class="flex items-center gap-3">
              <span class="text-xs px-2 py-1 rounded-full font-medium"
                    :class="statusClass(g.status)"
                    x-text="statusLabel(g.status)"></span>
              <span class="text-gray-400">›</span>
            </div>
          </div>
        </a>
        <div class="border-t border-gray-100 px-4 py-2 flex justify-end">
          <button @click.stop="deleteGame(g.id)"
                  class="btn-tap text-red-400 hover:text-red-600 text-sm transition-colors">
            Löschen
          </button>
        </div>
      </li>
    </template>
    <li x-show="games.length === 0" class="text-gray-400 text-sm text-center py-12">
      Noch keine Spiele angelegt.
    </li>
  </ul>
</div>
{% endblock %}

{% block scripts %}
<script>
function gamesApp() {
  return {
    games: [],
    allPlayers: [],
    showForm: false,
    form: { date: new Date().toISOString().slice(0,10), opponent: '', player_ids: [] },
    async load() {
      const [gr, pr] = await Promise.all([fetch('/api/games'), fetch('/api/players')]);
      this.games = await gr.json();
      this.allPlayers = await pr.json();
    },
    async createGame() {
      if (!this.form.date || !this.form.opponent.trim()) {
        alert('Bitte Datum und Gegner angeben.');
        return;
      }
      const r = await fetch('/api/games', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(this.form)
      });
      if (r.ok) {
        const g = await r.json();
        this.showForm = false;
        this.form = { date: new Date().toISOString().slice(0,10), opponent: '', player_ids: [] };
        await this.load();
        window.location.href = `/games/${g.id}`;
      }
    },
    async deleteGame(id) {
      if (!confirm('Spiel wirklich löschen?')) return;
      await fetch(`/api/games/${id}`, {method: 'DELETE'});
      await this.load();
    },
    formatDate(iso) {
      return new Date(iso).toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit', year:'numeric'});
    },
    statusLabel(s) {
      return {setup:'Vorbereitung', first_half:'1. HZ', paused_first:'Pause', second_half:'2. HZ', paused_second:'Pause', finished:'Beendet'}[s] || s;
    },
    statusClass(s) {
      if (s === 'finished') return 'bg-gray-100 text-gray-500';
      if (s === 'setup') return 'bg-blue-100 text-blue-700';
      return 'bg-green-100 text-green-700';
    }
  }
}
</script>
{% endblock %}
